events { worker_connections 1024; }

http {

    limit_req_zone $binary_remote_addr zone=api_general:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_login:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_browse:10m   rate=60r/m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream user_service           { server user-service:8001; }
    upstream listing_service        { server listing-service:8002; }
    upstream messaging_service      { server messaging-service:8003; }
    upstream activity_service       { server activity-service:8004; }
    upstream recommendation_service { server recommendation-service:8005; }

    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host            $host;

    server {
        listen 80;

        location /messages/ws/ {
            proxy_pass http://messaging_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /auth/ {
            limit_req zone=api_login burst=2 nodelay;
            limit_req_status 429;
            proxy_pass http://user_service;
        }

        location /users/ {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://user_service;
        }

        location /marketplace/ {
            limit_req zone=api_browse burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://listing_service;
        }

        location /messages/ {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://messaging_service;
        }

        location /recommendations/ {
            proxy_pass http://recommendation_service;
        }

        location /activity/ {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://activity_service;
        }

        location /health {
            proxy_pass http://user_service;
        }

        location / {
            limit_req zone=api_general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://user_service;
        }
    }
}
