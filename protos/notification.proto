syntax = "proto3";
package electrohub.notification;

service NotificationService {
  rpc SendMessageNotification (MessageEvent) returns (Ack);
  rpc SendItemAlert           (ItemEvent)    returns (Ack);
}

message MessageEvent {
  string buyer_id  = 1;
  string seller_id = 2;
  int32  item_id   = 3;
  string subject   = 4;
  string message   = 5;
}

message ItemEvent {
  string seller_id = 1;
  int32  item_id   = 2;
  string category  = 3;
}

message Ack {
  bool   success = 1;
  string message = 2;
}
